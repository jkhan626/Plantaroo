function showProfileReview(overlay, profile) {
  overlay.querySelector('#profile-loading').style.display = 'none';
  overlay.querySelector('#profile-title').style.display    = 'block';

  var container = overlay.querySelector('#profile-fields');
  container.style.display = 'block';
  overlay.querySelector('#btn-save').style.display = 'block';

  function optionsHTML(options, selected) {
    var h = '';
    for (var i = 0; i < options.length; i++) {
      var v = options[i];
      var label = DROPDOWN_LABELS[v] || v;
      var s = (v === selected) ? ' selected' : '';
      h += '<option value="' + esc(v) + '"' + s + '>' + esc(label) + '</option>';
    }
    return h;
  }

  container.innerHTML =
    '<div class="profile-field">' +
      '<label>Baseline days</label>' +
      '<input type="number" id="pf-baseline" value="' + (profile.species_baseline_days || 7) + '" min="1" max="90" step="0.5"/>' +
    '</div>' +
    '<div class="profile-field">' +
      '<label>Moisture pref</label>' +
      '<select id="pf-moisture">' + optionsHTML(MOISTURE_OPTIONS, profile.moisture_pref || 'light_dry') + '</select>' +
    '</div>' +
    '<div class="profile-field">' +
      '<label>Feed every N waterings</label>' +
      '<input type="number" id="pf-feed-every" value="' + (profile.feed_every_n_waterings || 3) + '" min="0" max="30"/>' +
    '</div>' +
    '<div class="profile-field">' +
      '<label>Fertilizer type</label>' +
      '<select id="pf-fert-type">' + optionsHTML(FERT_TYPE_OPTIONS, profile.fert_type || 'balanced') + '</select>' +
    '</div>' +
    '<div class="profile-field">' +
      '<label>Carnivore</label>' +
      '<select id="pf-carnivore">' +
        '<option value="false"' + (!profile.carnivore ? ' selected' : '') + '>No</option>' +
        '<option value="true"'  + (profile.carnivore  ? ' selected' : '') + '>Yes</option>' +
      '</select>' +
    '</div>' +
    '<div class="profile-field">' +
      '<label>Water source</label>' +
      '<select id="pf-water-source">' + optionsHTML(WATER_SRC_OPTIONS, profile.water_source || 'tap_ok') + '</select>' +
    '</div>';
}

// Plants that get last_watered set to 6 days ago
var SIX_DAY_PLANTS = ["Satin Pothos", "Marble Queen Pothos", "Wax Plant 'Variegata'"];

async function seedPlants() {
  var existing = await dbGetAll('plants');
  if (existing.length > 0) return; // already seeded

  for (var i = 0; i < SEED_PLANTS.length; i++) {
    var s = SEED_PLANTS[i];
    var soil = SOIL_TABLE[s.soil_type];
    var effectiveStart = (soil && soil.mult !== null) ? s.species_baseline_days * soil.mult : 2;

    // Seed as never-watered: no synthetic "watered yesterday" anchor. The
    // first real watering sets a clean schedule anchor (see doWater).
    await dbAdd('plants', {
      name:                    s.name,
      room:                    s.room,
      light_type:              s.light_type,
      soil_type:               s.soil_type,
      photo:                   null,
      species_baseline_days:   s.species_baseline_days,
      moisture_pref:           s.moisture_pref,
      feed_every_n_waterings:  s.feed_every_n_waterings,
      fert_type:               s.fert_type,
      carnivore:               s.carnivore,
      water_source:            s.water_source,
      current_interval:        effectiveStart,
      recent_valid_gaps:       [],
      last_watered:            null,
      last_fertilized:         null,
      last_fed_at_count:       0,
      no_fert_until:           null,
      watering_count:          0,
      notes:                   '',
      created_at:              new Date().toISOString()
    });
  }
  console.log('Seeded ' + SEED_PLANTS.length + ' plants');
}

// ============================================================
// FIRST-RUN DATA BOOTSTRAP
// Cloud is the source of truth. On first sign-in (empty cloud) we
// preserve the user's existing local collection by importing the legacy
// IndexedDB; if there's nothing local either, we seed the defaults.
// ============================================================

async function importLegacyPlants(legacy) {
  // Re-key onto fresh integer ids to avoid any collisions, fix missing fields.
  for (var i = 0; i < legacy.plants.length; i++) {
    var p = legacy.plants[i];
    var oldId = p.id;
    p.id = genId();
    if (typeof p.notes === 'undefined') p.notes = '';
    if (typeof p.watering_count === 'undefined') p.watering_count = 0;
    if (!p.recent_valid_gaps) p.recent_valid_gaps = [];
    await dbPut('plants', p);
    // Carry over this plant's history under the new id.
    for (var j = 0; j < legacy.history.length; j++) {
      var h = legacy.history[j];
      if (h.plantId === oldId) {
        h.id = genId();
        h.plantId = p.id;
        await dbPut('history', h);
      }
    }
  }
  console.log('Imported ' + legacy.plants.length + ' plants from local storage');
}

// ONE-TIME clean-up: remove the synthetic "watered yesterday" anchor that
// seeding/import stamped on plants. Plants the user has ACTUALLY watered are
// preserved (and their first, synthetic gap is cleared so learning starts
// clean); plants never really watered become "never watered". Guarded durably
// in Firestore so it runs exactly once and can never wipe a real watering on a
// later run. If the guard can't be read, we do nothing (fail safe).
async function cleanSlateRepair() {
  var FB = _fb();
  var flagRef = FB.doc(FB.db, 'users', FB.uid, 'meta', 'flags');
  var snap;
  try { snap = await FB.getDoc(flagRef); }
  catch (e) { console.warn('cleanSlate: guard unreadable, skipping', e); return; }
  if (snap.exists() && snap.data().cleanSlateV1) return;

  for (var i = 0; i < _cache.plants.length; i++) {
    var p = _cache.plants[i];
    var baseline = getEffectiveStartingInterval(p);
    var gaps = p.recent_valid_gaps || [];

    if (isWateredToday(p)) {
      // Real watering today -> keep it, but make it a clean first anchor.
      var changed = false;
      if (gaps.length > 0)               { p.recent_valid_gaps = []; changed = true; }
      if (p.current_interval !== baseline){ p.current_interval = baseline; changed = true; }
      if ((p.watering_count || 0) !== 1) { p.watering_count = 1; changed = true; }
      if ((p.last_fed_at_count || 0) !== 0){ p.last_fed_at_count = 0; changed = true; }
      if (changed) await dbPut('plants', p);
    } else if (p.last_watered && (p.watering_count || 0) <= 1 && gaps.length === 0) {
      // Untouched synthetic anchor -> never watered.
      p.last_watered = null;
      p.watering_count = 0;
      p.recent_valid_gaps = [];
      p.current_interval = baseline;
      p.last_fed_at_count = 0;
      p.last_fertilized = null;
      await dbPut('plants', p);
    }
    // else: real history on a prior day -> leave entirely alone.
  }

  try { await FB.setDoc(flagRef, { cleanSlateV1: true }, { merge: true }); }
  catch (e) { console.warn('cleanSlate: could not set guard', e); }
}

async function bootstrapData() {
  await loadAllFromCloud();
  if (_cache.plants.length === 0) {
    var legacy = await readLegacyIndexedDB();
    if (legacy.plants.length > 0) await importLegacyPlants(legacy);
    else await seedPlants();
  }
  await cleanSlateRepair();
}

// ============================================================
// INITIALIZATION (auth-driven — see Firebase module script below)
// startApp() is invoked by the auth layer once a user is signed in.
// ============================================================

var _appStarted = false;

async function startApp() {
  if (_appStarted) { render(); return; }
  try {
    await bootstrapData();
    _appStarted = true;
    render();
    var so = document.getElementById('signin-overlay');
    if (so) so.style.display = 'none';
  } catch (err) {
    console.error('Plantaroo init failed:', err);
    var msg = document.getElementById('signin-error');
    if (msg) { msg.textContent = 'Could not load your data: ' + String(err); msg.style.display = 'block'; }
  }
}

function resetAppState() {
  // Called on sign-out: drop the session cache and force a fresh start.
  _appStarted = false;
  _cache = { plants: [], history: [], profileCache: {} };
}

// Expose for the Firebase module script (different script scope).
window.startApp = startApp;
window.resetAppState = resetAppState;

// Watchdog: if nothing has progressed after a while (e.g. the Firebase SDK
// failed to load on a flaky/offline first visit), replace the spinner with a
// helpful message instead of spinning forever.
setTimeout(function() {
  if (_appStarted) return;
  var sp    = document.getElementById('signin-spinner');
  var setup = document.getElementById('signin-setup');
  var btn   = document.getElementById('signin-google-btn');
  var stillSpinning = sp && sp.style.display !== 'none';
  var setupShown = setup && setup.style.display !== 'none';
  var btnShown = btn && btn.style.display !== 'none';
  if (stillSpinning && !setupShown && !btnShown) {
    sp.style.display = 'none';
    var err = document.getElementById('signin-error');
    if (err) { err.textContent = 'Couldn’t reach the server. Check your connection and reload.'; err.style.display = 'block'; }
  }
}, 12000);

if (configMissing) {

} else {

  });
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Bridge to the classic data-layer script.
  window.FB = { app, auth, db, uid: null, collection, doc, getDoc, getDocs, setDoc, deleteDoc };

  async function doSignIn() {
    if (errEl()) errEl().style.display = 'none';
    try {
      await setPersistence(auth, browserLocalPersistence);
      await signInWithPopup(auth, provider);
    } catch (e) {
      console.error('Sign-in failed', e);
      if (errEl()) { errEl().textContent = 'Sign-in failed: ' + ((e && e.message) || e); errEl().style.display = 'block'; }
    }
  }
  async function doSignOut() { try { await signOut(auth); } catch (e) { console.error(e); } }
  window.FB.signIn = doSignIn;
  window.FB.signOut = doSignOut;

  if (signinBtn()) signinBtn().addEventListener('click', doSignIn);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.FB.uid = user.uid;
      // Show the loading spinner (not the leftover button) while data loads.
      if (errEl())   errEl().style.display = 'none';
      if (signinBtn()) signinBtn().style.display = 'none';

      }

      if (window.startApp) window.startApp();
    } else {
      window.FB.uid = null;
      if (window.resetAppState) window.resetAppState();
      if (spinner())  spinner().style.display = 'none';
      if (signinBtn()) signinBtn().style.display = '';
      if (overlay())  overlay().style.display = 'flex';
      const ab = $('account-btn'); if (ab) ab.style.display = 'none';
      const am = $('account-menu'); if (am) am.style.display = 'none';

}

// Account button: toggle menu / sign out (works regardless of config state).
document.addEventListener('click', (e) => {
  const menu = $('account-menu');
  if (e.target.closest && e.target.closest('#account-btn')) {
    if (menu) menu.style.display = (menu.style.display === 'block' ? 'none' : 'block');
    return;
  }
  if (e.target.closest && e.target.closest('#account-signout')) {
    if (menu) menu.style.display = 'none';
    if (window.FB && window.FB.signOut) window.FB.signOut();
    return;
  }
  if (menu && menu.style.display === 'block') menu.style.display = 'none';
});
