<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
  * { margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }
  .icon {
    width: 1024px; height: 1024px;
    position: relative;
    background:
      radial-gradient(120% 90% at 50% 18%, #1B4231 0%, #122B20 52%, #0C1F17 100%);
  }
  .mark {
    position: absolute;
    left: 50%; top: 96px;
    transform: translateX(-50%);
  }
  .wordmark {
    position: absolute;
    left: 0; right: 0;
    top: 796px;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 124px;
    letter-spacing: -2px;
    color: #5BD98A;
  }
</style>
</head>
<body>
<div class="icon">
  <svg class="mark" width="660" height="660" viewBox="0 0 660 660">
    <defs>
      <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#6FE39B"/>
        <stop offset="55%" stop-color="#3FC878"/>
        <stop offset="100%" stop-color="#2BAA62"/>
      </linearGradient>
      <mask id="slits">
        <!-- organic monstera: gentle tilt, curved tapering edge cuts (stroked
             curves with round caps), staggered fenestration holes -->
        <g transform="rotate(-4 330 360)">
          <!-- leaf body: tip up, lobes + stem notch at the bottom -->
          <path fill="#fff" d="M330,542
            C262,598 148,588 110,498
            C74,412 86,294 168,196
            C228,124 296,76 330,66
            C364,76 432,124 492,196
            C574,294 586,412 550,498
            C512,588 398,598 330,542 Z"/>
          <!-- curved midrib -->
          <path d="M330,116 C322,250 326,400 330,528" stroke="#000" stroke-width="13" fill="none" stroke-linecap="round"/>
          <!-- left cuts: curve in from outside the edge, sagging toward the midrib -->
          <g stroke="#000" fill="none" stroke-linecap="round">
            <path d="M20,180 Q150,215 252,225" stroke-width="46"/>
            <path d="M4,300  Q140,340 256,344" stroke-width="50"/>
            <path d="M22,425 Q150,460 258,452" stroke-width="48"/>
          </g>
          <!-- right cuts: deliberately not a mirror — shifted and resized -->
          <g stroke="#000" fill="none" stroke-linecap="round">
            <path d="M640,160 Q520,195 408,210" stroke-width="44"/>
            <path d="M656,280 Q525,325 404,330" stroke-width="50"/>
            <path d="M640,405 Q510,445 402,436" stroke-width="48"/>
          </g>
          <!-- staggered fenestration holes near the midrib -->
          <g fill="#000">
            <ellipse cx="372" cy="252" rx="11" ry="16" transform="rotate(-10 372 252)"/>
            <ellipse cx="290" cy="392" rx="12" ry="18" transform="rotate(12 290 392)"/>
          </g>
        </g>
      </mask>
    </defs>
    <!-- S-curved stem rising into the notch -->
    <path d="M322,660 C314,622 340,584 330,540" stroke="#2BAA62" stroke-width="26" stroke-linecap="round" fill="none" transform="rotate(-4 330 360)"/>
    <rect x="0" y="0" width="660" height="660" fill="url(#leaf)" mask="url(#slits)"/>
  </svg>
  <div class="wordmark">plantaroo</div>
</div>
</body>
</html>
