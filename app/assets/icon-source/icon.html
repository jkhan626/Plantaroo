<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
  * { margin: 0; padding: 0; }
  html, body { width: 1024px; height: 1024px; overflow: hidden; }
  .icon {
    width: 1024px; height: 1024px;
    position: relative;
    background:
      radial-gradient(120% 90% at 50% 18%, #1B4231 0%, #122B20 52%, #0C1F17 100%);
  }
  .mark {
    position: absolute;
    left: 50%; top: 96px;
    transform: translateX(-50%);
  }
  .wordmark {
    position: absolute;
    left: 0; right: 0;
    top: 796px;
    text-align: center;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 124px;
    letter-spacing: -2px;
    color: #5BD98A;
  }
</style>
</head>
<body>
<div class="icon">
  <svg class="mark" width="660" height="660" viewBox="0 0 660 660">
    <defs>
      <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#6FE39B"/>
        <stop offset="55%" stop-color="#3FC878"/>
        <stop offset="100%" stop-color="#2BAA62"/>
      </linearGradient>
      <mask id="slits">
        <!-- leaf body (tip up, lobes + stem notch at the bottom): white = visible -->
        <path fill="#fff" d="M330,542
          C262,598 148,588 110,498
          C74,412 86,294 168,196
          C228,124 296,76 330,66
          C364,76 432,124 492,196
          C574,294 586,412 550,498
          C512,588 398,598 330,542 Z"/>
        <!-- midrib -->
        <rect x="323" y="112" width="14" height="420" rx="7" fill="#000"/>
        <!-- left fenestrations: cuts open at the edge and sweep down toward the
             midrib (parallel to the veins); lobes at the base stay solid -->
        <g fill="#000">
          <rect x="95" y="150" width="185" height="42" rx="21" transform="rotate(8 95 150)"/>
          <rect x="52" y="232" width="230" height="46" rx="23" transform="rotate(10 52 232)"/>
          <rect x="28" y="330" width="255" height="48" rx="24" transform="rotate(14 28 330)"/>
          <rect x="18" y="430" width="260" height="48" rx="24" transform="rotate(18 18 430)"/>
        </g>
        <!-- right fenestrations (mirrored) -->
        <g fill="#000" transform="translate(660,0) scale(-1,1)">
          <rect x="95" y="150" width="185" height="42" rx="21" transform="rotate(8 95 150)"/>
          <rect x="52" y="232" width="230" height="46" rx="23" transform="rotate(10 52 232)"/>
          <rect x="28" y="330" width="255" height="48" rx="24" transform="rotate(14 28 330)"/>
          <rect x="18" y="430" width="260" height="48" rx="24" transform="rotate(18 18 430)"/>
        </g>
      </mask>
    </defs>
    <!-- stem: rises into the notch between the bottom lobes -->
    <path d="M330,660 C330,630 330,580 330,535" stroke="#2BAA62" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- leaf with slit mask -->
    <rect x="0" y="0" width="660" height="660" fill="url(#leaf)" mask="url(#slits)"/>
  </svg>
  <div class="wordmark">plantaroo</div>
</div>
</body>
</html>
