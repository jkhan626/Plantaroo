<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 760px;
    background: #1C1C1E;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    color: #fff;
    display: flex; flex-direction: column;
    padding: 40px 48px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 28px; color: #eee; }
  .row { display: flex; gap: 56px; align-items: flex-start; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cell span { font-size: 13px; color: #98989E; }
  img { display: block; }
  .big   { width: 360px; height: 360px; border-radius: 80px; }
  .store { width: 180px; height: 180px; border-radius: 40px; }
  .home  { width: 120px; height: 120px; border-radius: 27px; }
  .small { width: 60px;  height: 60px;  border-radius: 13px; }
  /* iPhone home-screen mock */
  .phone {
    width: 320px; padding: 28px 22px;
    background: linear-gradient(160deg, #3a4a52 0%, #22282e 100%);
    border-radius: 28px;
  }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 10px; }
  .app { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .app img, .app .fake { width: 58px; height: 58px; border-radius: 13px; }
  .app span { font-size: 10px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .f1 { background: linear-gradient(135deg,#5AC8FA,#007AFF); }
  .f2 { background: linear-gradient(135deg,#FF9500,#FF3B30); }
  .f3 { background: linear-gradient(135deg,#BF5AF2,#5E5CE6); }
  .f4 { background: #1DB954; }
  .f5 { background: linear-gradient(135deg,#FFD60A,#FF9F0A); }
  .f6 { background: #18222D; }
  .f7 { background: linear-gradient(135deg,#FF2D55,#FF375F); }
</style>
</head>
<body>
  <h1>Plantaroo — icon preview</h1>
  <div class="row">
    <div class="cell"><img class="big" src="../icon.png"><span>App Store product page</span></div>
    <div class="cell">
      <div class="phone">
        <div class="grid">
          <div class="app"><div class="fake f1"></div><span>Weather</span></div>
          <div class="app"><div class="fake f2"></div><span>Music</span></div>
          <div class="app"><img src="../icon.png"><span>Plantaroo</span></div>
          <div class="app"><div class="fake f3"></div><span>Photos</span></div>
          <div class="app"><div class="fake f4"></div><span>Spotify</span></div>
          <div class="app"><div class="fake f5"></div><span>Notes</span></div>
          <div class="app"><div class="fake f6"></div><span>Liftaroo</span></div>
          <div class="app"><div class="fake f7"></div><span>Fitness</span></div>
        </div>
      </div>
      <span>iPhone home screen</span>
    </div>
    <div class="cell"><img class="store" src="../icon.png"><span>Search result · 180px</span></div>
    <div class="cell"><img class="home" src="../icon.png"><span>Home · 120px</span></div>
    <div class="cell"><img class="small" src="../icon.png"><span>Settings · 60px</span></div>
  </div>
</body>
</html>
